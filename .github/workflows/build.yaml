name: Build Open Source Components

on:
  pull_request:
    paths-ignore:
      - "README.md"
      - "doc/**"
  workflow_run:
    workflows:
      - Release
    types:
      - completed

jobs:
  build:
    runs-on: [self-hosted, Linux]

    strategy:
      matrix:
        machine: ["mt7688", "at91sam"]

    steps:
      - name: Checkout code including full history and submodules
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: true
          fetch-depth: 0

      - name: Install Yocto dependencies
        run: |
          sudo apt update && sudo apt -qy --no-install-recommends install \
            build-essential \
            chrpath \
            cpio \
            debianutils \
            diffstat \
            file \
            gawk \
            gcc \
            git \
            iputils-ping \
            libacl1 \
            liblz4-tool \
            locales \
            python3 \
            python3-git \
            python3-jinja2 \
            python3-pexpect \
            python3-pip \
            python3-subunit \
            socat \
            texinfo \
            unzip \
            wget \
            xz-utils \
            zstd \
            ;

      - name: Generate locales
        run: sudo locale-gen en_US.UTF-8

      - name: Build Open Source components
        run: |
          scripts/bbwrapper.sh ${{ matrix.machine }} gardena-image-foss-bnw linux-yocto-tiny u-boot
          scripts/bbwrapper.sh ${{ matrix.machine }} package-index

      # Ignoring spdx/by-* folders because the action can not deal with colons in
      # file names
      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: Build artifacts (${{ matrix.machine }})
          path: |
            build-${{ matrix.machine }}/tmp/deploy
            !build-${{ matrix.machine }}/tmp/deploy/spdx/SPDX-1.1/by-hash
            !build-${{ matrix.machine }}/tmp/deploy/spdx/SPDX-1.1/by-namespace

      - name: Generate dependency graph for debugging
        if: failure()
        run: scripts/bbwrapper.sh ${{ matrix.machine }} -g gardena-image-foss-bnw || true

      - name: Upload files for debugging build
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-debug-${{ matrix.machine }}
          path: |
            build-${{ matrix.machine }}/task-depends.dot
            build-${{ matrix.machine }}/tmp/work/**/temp/log.*
